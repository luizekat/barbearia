<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WS Barbearia — Painel do Barbeiro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E2C06A;
    --black: #0D0D0D;
    --dark: #141414;
    --card: #1C1C1C;
    --card2: #222222;
    --border: #2E2E2E;
    --text: #F5F0E8;
    --muted: #888;
    --success: #4CAF7D;
    --danger: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 70px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--black);
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .logo-sub {
    font-size: 0.65rem;
    color: var(--gold);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
    display: block;
    line-height: 1;
  }

  .header-badge {
    background: rgba(201,168,76,0.12);
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--gold);
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 20px;
  }

  /* PAINEL HERO */
  .panel-hero {
    background: linear-gradient(135deg, var(--dark), #120e00);
    border-bottom: 1px solid var(--border);
    padding: 32px 2rem;
  }

  .panel-hero-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
    flex-wrap: wrap;
  }

  .panel-hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .panel-hero p { color: var(--muted); font-size: 0.85rem; }

  .stats-row {
    display: flex;
    gap: 16px;
  }

  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    text-align: center;
    min-width: 100px;
  }

  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* FILTROS */
  .filters {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 16px 2rem;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .filters-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 7px 16px;
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--gold); color: var(--text); }
  .filter-btn.active { background: var(--gold); color: var(--black); border-color: var(--gold); font-weight: 600; }

  .filter-search {
    margin-left: auto;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
    width: 200px;
  }

  .filter-search:focus { border-color: var(--gold); }
  .filter-search::placeholder { color: #555; }

  /* MAIN */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 2rem 80px;
  }

  /* DAY GROUP */
  .day-group { margin-bottom: 40px; }

  .day-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .day-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 600;
  }

  .day-date {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .day-count {
    margin-left: auto;
    background: rgba(201,168,76,0.12);
    color: var(--gold);
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .day-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CARDS DE AGENDAMENTO */
  .appointments-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .appointment-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .appointment-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--gold);
    border-radius: 3px 0 0 3px;
  }

  .appointment-card:hover { border-color: rgba(201,168,76,0.3); }

  .appt-time {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .appt-time-badge {
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Playfair Display', serif;
    padding: 6px 12px;
    border-radius: 8px;
    letter-spacing: 0.5px;
  }

  .appt-name {
    font-size: 1.05rem;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .appt-service-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }

  .service-tag {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 9px;
    font-size: 0.73rem;
    color: var(--muted);
    font-weight: 500;
  }

  .appt-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .appt-id {
    font-size: 0.68rem;
    color: #444;
  }

  .btn-delete {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-delete:hover { border-color: var(--danger); color: var(--danger); }

  /* VAZIO */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-state h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    margin-bottom: 8px;
    color: var(--text);
  }

  .empty-state p { font-size: 0.85rem; }

  /* BOTÃO LIMPAR */
  .danger-zone {
    text-align: center;
    margin-top: 40px;
    padding-top: 30px;
    border-top: 1px solid var(--border);
  }

  .btn-danger {
    background: transparent;
    border: 1.5px solid rgba(248,113,113,0.3);
    color: var(--danger);
    padding: 10px 20px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-danger:hover { background: rgba(248,113,113,0.08); border-color: var(--danger); }

  /* HOJE badge */
  .today-badge {
    background: rgba(76,175,125,0.15);
    color: var(--success);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* LINK CLIENTE */
  .client-link {
    display: block;
    text-align: center;
    margin-top: 50px;
    padding: 14px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.8rem;
    text-decoration: none;
    transition: color 0.2s;
  }
  .client-link:hover { color: var(--gold); }
  .client-link span { color: var(--gold); font-weight: 600; }

  /* ATUALIZAÇÃO */
  .refresh-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

  @media (max-width: 600px) {
    .stats-row { display: none; }
    .filter-search { width: 140px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">WS</div>
      <div>
        <span class="logo-text">WS Barbearia</span>
        <span class="logo-sub">Painel Interno</span>
      </div>
    </div>
    <div class="header-badge">✂ Barbeiros</div>
  </div>
</header>

<div class="panel-hero">
  <div class="panel-hero-inner">
    <div>
      <h1>Agenda do dia</h1>
      <p id="dataHoje"></p>
    </div>
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="statHoje">0</div>
        <div class="stat-label">Hoje</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statSemana">0</div>
        <div class="stat-label">Esta semana</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Total</div>
      </div>
    </div>
  </div>
</div>

<div class="filters">
  <div class="filters-inner">
    <button class="filter-btn active" onclick="setFilter('todos', this)">Todos</button>
    <button class="filter-btn" onclick="setFilter('hoje', this)">Hoje</button>
    <button class="filter-btn" onclick="setFilter('semana', this)">Esta semana</button>
    <button class="filter-btn" onclick="setFilter('cabelo', this)">✂ Cabelo</button>
    <button class="filter-btn" onclick="setFilter('barba', this)">🪒 Barba</button>
    <button class="filter-btn" onclick="setFilter('sobrancelha', this)">👁 Sobrancelha</button>
    <button class="refresh-btn" onclick="renderAgenda()">↻ Atualizar</button>
    <input class="filter-search" type="text" placeholder="Buscar cliente..." oninput="setSearch(this.value)" id="searchInput">
  </div>
</div>

<main>
  <div id="agendaContainer"></div>

  <div class="danger-zone">
    <button class="btn-danger" onclick="limparTodos()">🗑 Limpar todos os agendamentos</button>
  </div>
</main>

<a href="index.html" class="client-link">← <span>Ir para a página de agendamento dos clientes</span></a>

<script>
  const DIAS_PT = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const MESES_PT_LONGO = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

  let filtroAtivo = 'todos';
  let buscaAtiva = '';

  // Data de hoje no header
  const hoje = new Date();
  document.getElementById('dataHoje').textContent =
    `${DIAS_PT[hoje.getDay()]}, ${hoje.getDate()} de ${MESES_PT_LONGO[hoje.getMonth()]} de ${hoje.getFullYear()}`;

  function getAgendamentos() {
    return JSON.parse(localStorage.getItem('ws_agendamentos') || '[]');
  }

  function setFilter(f, btn) {
    filtroAtivo = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAgenda();
  }

  function setSearch(v) {
    buscaAtiva = v.toLowerCase();
    renderAgenda();
  }

  function getHojeISO() {
    return new Date().toISOString().split('T')[0];
  }

  function getSemanaISO() {
    const dates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date();
      d.setDate(d.getDate() + i);
      dates.push(d.toISOString().split('T')[0]);
    }
    return dates;
  }

  function filtrarAgendamentos(list) {
    const hojeISO = getHojeISO();
    const semana = getSemanaISO();

    return list.filter(a => {
      // Filtro de período
      if (filtroAtivo === 'hoje' && a.data !== hojeISO) return false;
      if (filtroAtivo === 'semana' && !semana.includes(a.data)) return false;

      // Filtro de serviço
      const srv = (a.servico || '').toLowerCase();
      if (filtroAtivo === 'cabelo' && !srv.includes('cabelo')) return false;
      if (filtroAtivo === 'barba' && !srv.includes('barba')) return false;
      if (filtroAtivo === 'sobrancelha' && !srv.includes('sobrancelha')) return false;

      // Busca por nome
      if (buscaAtiva && !a.nome.toLowerCase().includes(buscaAtiva)) return false;

      return true;
    });
  }

  function deletarAgendamento(id) {
    if (!confirm('Remover este agendamento?')) return;
    const list = getAgendamentos().filter(a => a.id !== id);
    localStorage.setItem('ws_agendamentos', JSON.stringify(list));
    renderAgenda();
  }

  function limparTodos() {
    if (!confirm('Tem certeza? Todos os agendamentos serão removidos.')) return;
    localStorage.removeItem('ws_agendamentos');
    renderAgenda();
  }

  function renderAgenda() {
    const container = document.getElementById('agendaContainer');
    const todos = getAgendamentos();
    const filtrados = filtrarAgendamentos(todos);

    // Stats
    const hojeISO = getHojeISO();
    const semana = getSemanaISO();
    document.getElementById('statHoje').textContent = todos.filter(a => a.data === hojeISO).length;
    document.getElementById('statSemana').textContent = todos.filter(a => semana.includes(a.data)).length;
    document.getElementById('statTotal').textContent = todos.length;

    if (filtrados.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <h3>Nenhum agendamento encontrado</h3>
          <p>Quando clientes agendarem, eles aparecerão aqui.</p>
        </div>
      `;
      return;
    }

    // Agrupa por data
    const grupos = {};
    filtrados.forEach(a => {
      if (!grupos[a.data]) grupos[a.data] = [];
      grupos[a.data].push(a);
    });

    // Ordena datas
    const datasOrdenadas = Object.keys(grupos).sort();

    let html = '';
    datasOrdenadas.forEach(data => {
      const ags = grupos[data].sort((a, b) => a.hora.localeCompare(b.hora));
      const d = new Date(data + 'T12:00:00');
      const isHoje = data === hojeISO;
      const diaNome = DIAS_PT[d.getDay()];
      const diaLabel = `${d.getDate()} de ${MESES_PT_LONGO[d.getMonth()]}`;

      html += `
        <div class="day-group">
          <div class="day-header">
            <span class="day-title">${diaNome}</span>
            <span class="day-date">${diaLabel}</span>
            ${isHoje ? '<span class="today-badge">Hoje</span>' : ''}
            <div class="day-line"></div>
            <span class="day-count">${ags.length} agendamento${ags.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="appointments-grid">
      `;

      ags.forEach(a => {
        const servicos = a.servico.split('+').map(s => s.trim());
        const tagsHtml = servicos.map(s => `<span class="service-tag">${getServiceIcon(s)} ${s}</span>`).join('');

        html += `
          <div class="appointment-card">
            <div class="appt-time">
              <span class="appt-time-badge">⏱ ${a.hora}</span>
            </div>
            <p class="appt-name">👤 ${escapeHtml(a.nome)}</p>
            <div class="appt-service-tags">${tagsHtml}</div>
            <div class="appt-footer">
              <span class="appt-id">#${String(a.id).slice(-6)}</span>
              <button class="btn-delete" onclick="deletarAgendamento(${a.id})">Remover</button>
            </div>
          </div>
        `;
      });

      html += `</div></div>`;
    });

    container.innerHTML = html;
  }

  function getServiceIcon(s) {
    const sl = s.toLowerCase();
    if (sl.includes('cabelo')) return '✂️';
    if (sl.includes('barba')) return '🪒';
    if (sl.includes('sobrancelha')) return '👁️';
    return '✨';
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Render inicial
  renderAgenda();

  // Auto-atualiza a cada 30 segundos
  setInterval(renderAgenda, 30000);
</script>

</body>
</html>
